name: Build and Upload SDK

on:
  push:
    branches:
      - cpu
      - cuda
      - latest
      - rocm
      - vulkan
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name (e.g., latest)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    uses: canonical/sdkcraft-actions/.github/workflows/upload.yml@main
    strategy:
      matrix:
        include:
          - platforms: [ubuntu@22.04:amd64, ubuntu@24.04:amd64]
            runs-on: [self-hosted, linux, jammy, x64, xlarge]
          - platforms: [ubuntu@22.04:arm64, ubuntu@24.04:arm64]
            runs-on: [self-hosted, linux, jammy, ARM64, xlarge]
    with:
      runs-on: ${{ toJSON(matrix.runs-on) }}
      platforms: ${{ toJSON(matrix.platforms) }}
      platform-flag: "--platform"
      risk: "stable"
    secrets:
      SDKCRAFT_STORE_CREDENTIALS: ${{ secrets.SDKCRAFT_STORE_CREDENTIALS_PROD }}
